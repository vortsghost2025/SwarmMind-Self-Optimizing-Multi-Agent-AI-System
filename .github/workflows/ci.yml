name: SwarmMind CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lane-worker-and-executor-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lane Worker WE4FREE + Remediation Tests
        run: node scripts/test-lane-worker-we4free.js

      - name: Executor v3 Golden Tests
        run: node scripts/test-executor-v3.js
